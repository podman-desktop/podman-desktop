name: release-notes

on:
  workflow_dispatch:
    inputs:
      milestone:
        description: 'Milestone to generate release notes from (title of the milestone eg 1.0.0)'
        required: true
env:
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

jobs:

  build:
    name: Generate release notes
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Execute pnpm
        run: pnpm install

      - name: Build
        run: |
          cd tools
          pnpm build

      - name: Generate the release notes document
        run: |
          node tools/dist/release-notes-generator.cjs --milestone ${{ github.event.inputs.milestone }} >release-notes.md

      - name: Archive the generated release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

      - name: Generate release notes website document
        run: |
          CURRENT_VERSION=$(echo "${{ steps.TAG_UTIL.outputs.desktopVersion }}")
          npx tsx scripts/release-notes/generate-release-notes.ts --milestone ${{ github.event.inputs.milestone }} --author ${{ github.actor }}

      - name: Create the PR with release notes website document 
        run: |
          git config --local user.name ${{ github.actor }}
          git config --local user.email "fbenoit@redhat.com"
          CURRENT_VERSION=$(echo "${{ steps.TAG_UTIL.outputs.desktopVersion }}")
          git checkout -b "release_notes_${CURRENT_VERSION}"
          git add website/blog/*.md
          git commit -s --amend -m "chore: added release notes for ${CURRENT_VERSION} release"
          git push origin "release_notes_${CURRENT_VERSION}"
          echo "📢 Pull request created"
          echo "➡️ Update the content and add images as needed"
